<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="theme-color" content="#9bd2ff" />
    <title>いちかくんの おてんき</title>
    <link rel="stylesheet" href="../shared/ehon.css" />
    <link rel="stylesheet" href="theme.css" />
  </head>
  <body>
    <main id="book" aria-label="おてんきの えほん">

      <!-- ページ1: はれ -->
      <section class="page page--sunny is-active" data-scene="sunny">
        <div class="sky sky--sunny">
          <div class="big-sun" aria-hidden="true">
            <div class="big-sun-core"></div>
            <div class="big-sun-rays"></div>
          </div>
          <div class="cloud cloud--s1" aria-hidden="true"></div>
          <div class="cloud cloud--s2" aria-hidden="true"></div>
          <div class="hill"></div>
        </div>
        <div class="title-banner">
          <span>いちかくんの<br/>おてんき</span>
        </div>
      </section>

      <!-- ページ2: くもり -->
      <section class="page page--cloudy" data-scene="cloudy">
        <div class="narration">いちかくん、<br/>くもさん いっぱい</div>
        <div class="sky sky--cloudy">
          <div class="cloud cloud--c1" aria-hidden="true"></div>
          <div class="cloud cloud--c2" aria-hidden="true"></div>
          <div class="cloud cloud--c3" aria-hidden="true"></div>
          <div class="cloud cloud--c4" aria-hidden="true"></div>
          <div class="hill hill--green"></div>
        </div>
      </section>

      <!-- ページ3: あめ -->
      <section class="page page--rainy" data-scene="rainy">
        <div class="narration">いちかくん、<br/>あめ ふってきた！</div>
        <div class="sky sky--rainy">
          <div class="cloud cloud--dark cloud--r1" aria-hidden="true"></div>
          <div class="cloud cloud--dark cloud--r2" aria-hidden="true"></div>
          <div class="rain" aria-hidden="true">
            <span style="--x:8%;  --d:0s;   --t:1.1s"></span>
            <span style="--x:18%; --d:.3s;  --t:1.3s"></span>
            <span style="--x:28%; --d:.6s;  --t:1.0s"></span>
            <span style="--x:38%; --d:.1s;  --t:1.2s"></span>
            <span style="--x:48%; --d:.5s;  --t:1.1s"></span>
            <span style="--x:58%; --d:.2s;  --t:1.4s"></span>
            <span style="--x:68%; --d:.7s;  --t:1.0s"></span>
            <span style="--x:78%; --d:.4s;  --t:1.3s"></span>
            <span style="--x:88%; --d:.1s;  --t:1.2s"></span>
          </div>
          <div class="umbrella" aria-hidden="true">
            <svg viewBox="0 0 200 220" xmlns="http://www.w3.org/2000/svg">
              <path d="M20 100 Q100 0 180 100 Z" fill="#ff6b9d" stroke="#1a1a2e" stroke-width="5" stroke-linejoin="round"/>
              <path d="M20 100 Q50 110 70 100" fill="none" stroke="#1a1a2e" stroke-width="4"/>
              <path d="M70 100 Q90 110 110 100" fill="none" stroke="#1a1a2e" stroke-width="4"/>
              <path d="M110 100 Q130 110 150 100" fill="none" stroke="#1a1a2e" stroke-width="4"/>
              <path d="M150 100 Q170 110 180 100" fill="none" stroke="#1a1a2e" stroke-width="4"/>
              <line x1="100" y1="100" x2="100" y2="190" stroke="#1a1a2e" stroke-width="6" stroke-linecap="round"/>
              <path d="M100 190 Q110 205 95 210" fill="none" stroke="#1a1a2e" stroke-width="6" stroke-linecap="round"/>
              <circle cx="100" cy="50" r="6" fill="#ffd166" stroke="#1a1a2e" stroke-width="3"/>
            </svg>
          </div>
          <div class="hill hill--wet"></div>
        </div>
      </section>

      <!-- ページ4: かみなり -->
      <section class="page page--thunder" data-scene="thunder">
        <div class="narration narration--night">いちかくん、<br/>ピカッ ゴロゴロ！</div>
        <div class="sky sky--thunder">
          <div class="cloud cloud--dark cloud--t1" aria-hidden="true"></div>
          <div class="cloud cloud--dark cloud--t2" aria-hidden="true"></div>
          <div class="bolt bolt--1" aria-hidden="true">
            <svg viewBox="0 0 80 200" xmlns="http://www.w3.org/2000/svg">
              <path d="M40 0 L10 110 L34 110 L20 200 L70 80 L46 80 Z" fill="#ffd166" stroke="#1a1a2e" stroke-width="4" stroke-linejoin="round"/>
            </svg>
          </div>
          <div class="bolt bolt--2" aria-hidden="true">
            <svg viewBox="0 0 80 200" xmlns="http://www.w3.org/2000/svg">
              <path d="M40 0 L10 110 L34 110 L20 200 L70 80 L46 80 Z" fill="#ffd166" stroke="#1a1a2e" stroke-width="4" stroke-linejoin="round"/>
            </svg>
          </div>
          <div class="thunder-flash" aria-hidden="true"></div>
          <div class="hill hill--dark"></div>
        </div>
      </section>

      <!-- ページ5: にじ -->
      <section class="page page--rainbow" data-scene="rainbow">
        <div class="sky sky--rainbow">
          <div class="rainbow" aria-hidden="true">
            <svg viewBox="0 0 400 200" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none">
              <path d="M20 200 A180 180 0 0 1 380 200" fill="none" stroke="#ff5252" stroke-width="20"/>
              <path d="M40 200 A160 160 0 0 1 360 200" fill="none" stroke="#ff9a3c" stroke-width="20"/>
              <path d="M60 200 A140 140 0 0 1 340 200" fill="none" stroke="#ffd166" stroke-width="20"/>
              <path d="M80 200 A120 120 0 0 1 320 200" fill="none" stroke="#7ed957" stroke-width="20"/>
              <path d="M100 200 A100 100 0 0 1 300 200" fill="none" stroke="#5dade2" stroke-width="20"/>
              <path d="M120 200 A80 80 0 0 1 280 200" fill="none" stroke="#a06cd5" stroke-width="20"/>
            </svg>
          </div>
          <div class="big-sun big-sun--small" aria-hidden="true">
            <div class="big-sun-core"></div>
            <div class="big-sun-rays"></div>
          </div>
          <div class="cloud cloud--s1" aria-hidden="true"></div>
          <div class="hill hill--green"></div>
        </div>
        <div class="title-banner title-banner--end">
          <span>いちかくん、<br/>にじ きれい！</span>
        </div>
      </section>

      <div id="fx-layer" aria-hidden="true"></div>

      <div id="cam-window" class="cam-window cam-window--off" aria-label="みんなの かお">
        <video id="cam-video" autoplay playsinline muted></video>
        <button id="cam-toggle" class="cam-toggle" aria-label="いちかくんを タップ">
          <span class="cam-toggle-icon" aria-hidden="true">
            <svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
              <path d="M22 60 Q22 22 60 22 Q98 22 98 60 L98 50 Q82 36 60 36 Q38 36 22 50 Z"
                    fill="#3a2418" stroke="#1a1a2e" stroke-width="3" stroke-linejoin="round"/>
              <ellipse cx="60" cy="68" rx="38" ry="36" fill="#ffe0c2" stroke="#1a1a2e" stroke-width="3"/>
              <circle cx="34" cy="78" r="7" fill="#ff8aa8" opacity="0.85"/>
              <circle cx="86" cy="78" r="7" fill="#ff8aa8" opacity="0.85"/>
              <path d="M42 68 Q47 62 52 68" fill="none" stroke="#1a1a2e" stroke-width="3.5" stroke-linecap="round"/>
              <path d="M68 68 Q73 62 78 68" fill="none" stroke="#1a1a2e" stroke-width="3.5" stroke-linecap="round"/>
              <path d="M52 86 Q60 94 68 86" fill="#ff6b9d" stroke="#1a1a2e" stroke-width="3" stroke-linejoin="round" stroke-linecap="round"/>
            </svg>
          </span>
          <span class="cam-toggle-label">いちかくんを<br/>タップ！</span>
        </button>
      </div>

      <nav class="parent-nav" aria-label="ぺーじ そうさ">
        <a class="home-btn" href="../" aria-label="ほんだなへ もどる">🏠</a>
        <button class="nav-btn nav-btn--prev" aria-label="まえのページ">◀</button>
        <div class="dots" id="dots"></div>
        <button class="nav-btn nav-btn--next" aria-label="つぎのページ">▶</button>
      </nav>
    </main>

    <script src="config.js"></script>
    <script src="../shared/ehon.js"></script>
  </body>
</html>
