# PR がマージされたら、その PR にひも付く Issue を確実に close するガードレール。
#
# GitHub は通常 PR 本文の `Closes #N` 等を拾ってデフォルトブランチへのマージ時に
# 自動で Issue を閉じる。本 workflow はその「保険」で、ネイティブ自動クローズが
# 何らかの理由で発火しなかった場合でも、リンク済み Issue を取りこぼさず閉じる。
#
# 閉じる対象は次の 2 系統（どちらも「閉じる意図が明示された」もののみ。誤爆防止）:
#   1) GitHub が closing keyword から解決した closingIssuesReferences
#   2) PR 本文を正規表現で走査した close/fix/resolve 系キーワード + #N
# 単なる言及（`see #N` 等）は閉じない。
#
# privacy: 扱うのは Issue 番号のみ。個人名は出力しない（baby-ehon プライバシー方針）。
name: auto-close-linked-issues

on:
  pull_request:
    types: [closed]

permissions:
  contents: read
  issues: write

jobs:
  close-linked-issues:
    # マージされた PR だけが対象（単に close された PR では何もしない）
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Close issues linked to the merged PR
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const pr = context.payload.pull_request;
            const numbers = new Set();

            // (1) GitHub が解決済みの closingIssuesReferences を取得
            const result = await github.graphql(
              `query($owner:String!, $repo:String!, $pr:Int!) {
                 repository(owner:$owner, name:$repo) {
                   pullRequest(number:$pr) {
                     closingIssuesReferences(first:50) { nodes { number } }
                   }
                 }
               }`,
              { owner, repo, pr: pr.number }
            );
            for (const n of result.repository.pullRequest.closingIssuesReferences.nodes) {
              numbers.add(n.number);
            }

            // (2) PR 本文の closing keyword を正規表現で補完
            const body = pr.body || '';
            const re = /\b(?:close[sd]?|fix(?:e[sd])?|resolve[sd]?)\b[:\s]+#(\d+)/gi;
            let m;
            while ((m = re.exec(body)) !== null) {
              numbers.add(parseInt(m[1], 10));
            }

            if (numbers.size === 0) {
              core.info('リンクされた Issue はありません。何もしません。');
              return;
            }

            for (const number of numbers) {
              const { data: issue } = await github.rest.issues.get({ owner, repo, issue_number: number });
              if (issue.state === 'closed') {
                core.info(`#${number} は既に closed。スキップ。`);
                continue;
              }
              await github.rest.issues.createComment({
                owner, repo, issue_number: number,
                body: `PR #${pr.number} がマージされたため自動クローズしました（auto-close-linked-issues ガードレール）。`,
              });
              await github.rest.issues.update({
                owner, repo, issue_number: number,
                state: 'closed', state_reason: 'completed',
              });
              core.info(`#${number} を closed にしました。`);
            }
