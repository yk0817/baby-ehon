<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="theme-color" content="#ffc4c4" />
    <title>__NAME__の いろと かたち</title>
    <link rel="stylesheet" href="../shared/ehon.css" />
    <link rel="stylesheet" href="theme.css" />
  </head>
  <body>
    <main id="book" aria-label="いろと かたちの えほん">

      <!-- ページ1: あかい まる -->
      <section class="page page--maru is-active" data-scene="maru">
        <div class="room room--maru">
          <div class="sparkles" aria-hidden="true"><i></i><i></i><i></i><i></i><i></i></div>
          <div class="floor"></div>
          <div class="subject subject--bob" aria-hidden="true">
            <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
              <ellipse cx="100" cy="188" rx="60" ry="9" fill="rgba(0,0,0,.12)"/>
              <circle cx="100" cy="100" r="68" fill="#ff5a5f" stroke="#1a1a2e" stroke-width="5"/>
              <circle cx="82" cy="94" r="7" fill="#1a1a2e"/>
              <circle cx="118" cy="94" r="7" fill="#1a1a2e"/>
              <circle cx="85" cy="91" r="2.5" fill="#fff"/>
              <circle cx="121" cy="91" r="2.5" fill="#fff"/>
              <path d="M84 118 Q100 134 116 118" fill="none" stroke="#1a1a2e" stroke-width="4.5" stroke-linecap="round"/>
              <circle cx="68" cy="114" r="8" fill="#ff8aa8" opacity=".55"/>
              <circle cx="132" cy="114" r="8" fill="#ff8aa8" opacity=".55"/>
            </svg>
          </div>
        </div>
        <div class="title-banner"><span>__NAME__の<br/>いろと かたち</span></div>
      </section>

      <!-- ページ2: あおい さんかく -->
      <section class="page page--sankaku" data-scene="sankaku">
        <div class="narration">__NAME__、<br/>あおい さんかく</div>
        <div class="room room--sankaku">
          <div class="sparkles" aria-hidden="true"><i></i><i></i><i></i><i></i><i></i></div>
          <div class="floor"></div>
          <div class="subject subject--bob" aria-hidden="true">
            <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
              <ellipse cx="100" cy="188" rx="62" ry="9" fill="rgba(0,0,0,.12)"/>
              <path d="M100 30 L172 168 L28 168 Z" fill="#4a9ff5" stroke="#1a1a2e" stroke-width="5" stroke-linejoin="round"/>
              <circle cx="86" cy="126" r="7" fill="#1a1a2e"/>
              <circle cx="114" cy="126" r="7" fill="#1a1a2e"/>
              <circle cx="89" cy="123" r="2.5" fill="#fff"/>
              <circle cx="117" cy="123" r="2.5" fill="#fff"/>
              <path d="M88 144 Q100 156 112 144" fill="none" stroke="#1a1a2e" stroke-width="4.5" stroke-linecap="round"/>
              <circle cx="74" cy="142" r="7" fill="#ff8aa8" opacity=".55"/>
              <circle cx="126" cy="142" r="7" fill="#ff8aa8" opacity=".55"/>
            </svg>
          </div>
        </div>
      </section>

      <!-- ページ3: きいろい しかく -->
      <section class="page page--shikaku" data-scene="shikaku">
        <div class="narration">__NAME__、<br/>きいろい しかく</div>
        <div class="room room--shikaku">
          <div class="sparkles" aria-hidden="true"><i></i><i></i><i></i><i></i><i></i></div>
          <div class="floor"></div>
          <div class="subject subject--bob" aria-hidden="true">
            <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
              <ellipse cx="100" cy="188" rx="60" ry="9" fill="rgba(0,0,0,.12)"/>
              <rect x="36" y="40" width="128" height="128" rx="14" fill="#ffd166" stroke="#1a1a2e" stroke-width="5"/>
              <circle cx="82" cy="96" r="7" fill="#1a1a2e"/>
              <circle cx="118" cy="96" r="7" fill="#1a1a2e"/>
              <circle cx="85" cy="93" r="2.5" fill="#fff"/>
              <circle cx="121" cy="93" r="2.5" fill="#fff"/>
              <path d="M84 118 Q100 134 116 118" fill="none" stroke="#1a1a2e" stroke-width="4.5" stroke-linecap="round"/>
              <circle cx="66" cy="114" r="8" fill="#ff8aa8" opacity=".5"/>
              <circle cx="134" cy="114" r="8" fill="#ff8aa8" opacity=".5"/>
            </svg>
          </div>
        </div>
      </section>

      <!-- ページ4: みどりの ほし -->
      <section class="page page--hoshi" data-scene="hoshi">
        <div class="narration">__NAME__、<br/>みどりの ほし</div>
        <div class="room room--hoshi">
          <div class="sparkles" aria-hidden="true"><i></i><i></i><i></i><i></i><i></i></div>
          <div class="floor"></div>
          <div class="subject subject--twirl" aria-hidden="true">
            <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
              <ellipse cx="100" cy="190" rx="58" ry="8" fill="rgba(0,0,0,.10)"/>
              <polygon points="100,24 122,80 182,80 134,118 152,178 100,142 48,178 66,118 18,80 78,80"
                       fill="#5fc85f" stroke="#1a1a2e" stroke-width="5" stroke-linejoin="round"/>
              <circle cx="88" cy="92" r="6.5" fill="#1a1a2e"/>
              <circle cx="112" cy="92" r="6.5" fill="#1a1a2e"/>
              <circle cx="90.5" cy="89.5" r="2.3" fill="#fff"/>
              <circle cx="114.5" cy="89.5" r="2.3" fill="#fff"/>
              <path d="M89 108 Q100 120 111 108" fill="none" stroke="#1a1a2e" stroke-width="4" stroke-linecap="round"/>
              <circle cx="76" cy="105" r="6.5" fill="#ff8aa8" opacity=".5"/>
              <circle cx="124" cy="105" r="6.5" fill="#ff8aa8" opacity=".5"/>
            </svg>
          </div>
        </div>
      </section>

      <!-- ページ5: かたち あつまれ -->
      <section class="page page--atsumare" data-scene="atsumare">
        <div class="room room--atsumare">
          <div class="sparkles" aria-hidden="true"><i></i><i></i><i></i><i></i><i></i></div>
          <div class="floor"></div>
          <div class="subject subject--bob" aria-hidden="true">
            <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
              <ellipse cx="100" cy="190" rx="66" ry="8" fill="rgba(0,0,0,.10)"/>
              <g fill="none" stroke-width="12" stroke-linecap="round">
                <path d="M30 150 A70 70 0 0 1 170 150" stroke="#ff5a5f"/>
                <path d="M46 150 A54 54 0 0 1 154 150" stroke="#ffd166"/>
                <path d="M62 150 A38 38 0 0 1 138 150" stroke="#5fc85f"/>
              </g>
              <circle cx="52" cy="118" r="24" fill="#ff5a5f" stroke="#1a1a2e" stroke-width="4"/>
              <path d="M100 74 L128 126 L72 126 Z" fill="#4a9ff5" stroke="#1a1a2e" stroke-width="4" stroke-linejoin="round"/>
              <rect x="124" y="98" width="44" height="44" rx="7" fill="#ffd166" stroke="#1a1a2e" stroke-width="4"/>
              <polygon points="100,26 108,46 130,46 112,58 118,80 100,66 82,80 88,58 70,46 92,46"
                       fill="#5fc85f" stroke="#1a1a2e" stroke-width="3.5" stroke-linejoin="round"/>
            </svg>
          </div>
          <div class="title-banner title-banner--end"><span>__NAME__、<br/>いろと かたち だいすき！</span></div>
        </div>
      </section>

      <div id="fx-layer" aria-hidden="true"></div>

      <div id="cam-window" class="cam-window cam-window--off" aria-label="みんなの かお">
        <video id="cam-video" autoplay playsinline muted></video>
        <button id="cam-toggle" class="cam-toggle" aria-label="__NAME__を タップ">
          <span class="cam-toggle-icon" aria-hidden="true">
            <svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
              <path d="M22 60 Q22 22 60 22 Q98 22 98 60 L98 50 Q82 36 60 36 Q38 36 22 50 Z"
                    fill="#3a2418" stroke="#1a1a2e" stroke-width="3" stroke-linejoin="round"/>
              <ellipse cx="60" cy="68" rx="38" ry="36" fill="#ffe0c2" stroke="#1a1a2e" stroke-width="3"/>
              <circle cx="34" cy="78" r="7" fill="#ff8aa8" opacity="0.85"/>
              <circle cx="86" cy="78" r="7" fill="#ff8aa8" opacity="0.85"/>
              <path d="M42 68 Q47 62 52 68" fill="none" stroke="#1a1a2e" stroke-width="3.5" stroke-linecap="round"/>
              <path d="M68 68 Q73 62 78 68" fill="none" stroke="#1a1a2e" stroke-width="3.5" stroke-linecap="round"/>
              <path d="M52 86 Q60 94 68 86" fill="#ff6b9d" stroke="#1a1a2e" stroke-width="3" stroke-linejoin="round" stroke-linecap="round"/>
            </svg>
          </span>
          <span class="cam-toggle-label">__NAME__を<br/>タップ！</span>
        </button>
      </div>

      <nav class="parent-nav" aria-label="ぺーじ そうさ">
        <a class="home-btn" href="../" aria-label="ほんだなへ もどる">🏠</a>
        <button class="nav-btn nav-btn--prev" aria-label="まえのページ">◀</button>
        <div class="dots" id="dots"></div>
        <button class="nav-btn nav-btn--next" aria-label="つぎのページ">▶</button>
        <button class="lock-btn" aria-label="ロック">🔒</button>
      </nav>
    </main>

    <script src="../shared/baby.js" onerror="this.dataset.missing=1"></script>
    <script src="config.js"></script>
    <script src="../shared/ehon.js"></script>
  </body>
</html>
