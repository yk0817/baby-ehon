<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="theme-color" content="#fff3e0" />
    <title>__NAME__の どうぶつ</title>
    <link rel="stylesheet" href="../shared/ehon.css" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main id="book" aria-label="どうぶつの えほん">

      <section class="page is-active" data-scene="main">
        <div class="animals">
          <div class="animal" data-sound="lion">
            <img src="images/lion.png" alt="ライオン" />
          </div>
          <div class="animal" data-sound="dog">
            <img src="images/dog.png" alt="いぬ" />
          </div>
          <div class="animal" data-sound="cat">
            <img src="images/cat.png" alt="ねこ" />
          </div>
        </div>
        <div class="title-banner"><span>__NAME__の<br/>どうぶつ</span></div>
      </section>

      <div id="fx-layer" aria-hidden="true"></div>

      <div id="cam-window" class="cam-window cam-window--off" aria-label="みんなの かお">
        <video id="cam-video" autoplay playsinline muted></video>
        <button id="cam-toggle" class="cam-toggle" aria-label="__NAME__を タップ">
          <span class="cam-toggle-icon" aria-hidden="true">
            <svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
              <circle cx="60" cy="60" r="50" fill="#ffd166" stroke="#1a1a2e" stroke-width="6"/>
            </svg>
          </span>
          <span class="cam-toggle-label">__NAME__を<br/>タップ！</span>
        </button>
      </div>

      <nav class="parent-nav" aria-label="ぺーじ そうさ">
        <a class="home-btn" href="../" aria-label="ほんだなへ もどる">🏠</a>
        <button class="nav-btn nav-btn--prev" aria-label="まえのページ">◀</button>
        <div class="dots" id="dots"></div>
        <button class="nav-btn nav-btn--next" aria-label="つぎのページ">▶</button>
        <button class="lock-btn" aria-label="ロック">🔒</button>
      </nav>
    </main>

    <script src="../shared/baby.js" onerror="this.dataset.missing=1"></script>
    <script src="config.js"></script>
    <script src="../shared/ehon.js"></script>
    <script src="script.js"></script>
  </body>
</html>
