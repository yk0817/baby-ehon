    <script src="shared/baby.js" onerror="this.dataset.missing=1"></script>
    <script>
      (() => {
        const BABY = window.BABY || { name: 'あかちゃん', honorific: '' };
        const NAME_FULL = `${BABY.name || 'あかちゃん'}${BABY.honorific || ''}`;
        const expand = (s) => (typeof s === 'string' ? s.split('__NAME__').join(NAME_FULL) : s);
        document.title = expand(document.title);
        const walker = document.createTreeWalker(document.body, NodeFilter.SHOW_TEXT);
        let n;
        while ((n = walker.nextNode())) {
          if (n.nodeValue && n.nodeValue.includes('__NAME__')) n.nodeValue = expand(n.nodeValue);
        }
      })();
    </script>
