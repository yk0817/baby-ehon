<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="theme-color" content="#1a1a4e" />
    <title>__NAME__くんの よる の そら</title>
    <link rel="stylesheet" href="../shared/ehon.css" />
    <link rel="stylesheet" href="theme.css" />
  </head>
  <body>
    <main id="book" aria-label="よる の そらの えほん">

      <!-- ページ1: ゆうぐれ -->
      <section class="page page--dusk is-active" data-scene="dusk">
        <div class="sky sky--dusk">
          <div class="sunset" aria-hidden="true"></div>
          <div class="cloud-line cloud-line--1"></div>
          <div class="cloud-line cloud-line--2"></div>
          <div class="cloud-line cloud-line--3"></div>
          <div class="mountain"></div>
          <div class="mountain mountain--back"></div>
        </div>
        <div class="title-banner">
          <span>__NAME__くんの<br/>よる の そら</span>
        </div>
      </section>

      <!-- ページ2: おつきさま -->
      <section class="page page--moon" data-scene="moon">
        <div class="narration narration--night">__NAME__くん、<br/>おつきさま！</div>
        <div class="sky sky--moon">
          <div class="moon-big" aria-hidden="true">
            <div class="moon-craters">
              <span style="--mx:30%; --my:36%; --ms:14%"></span>
              <span style="--mx:58%; --my:48%; --ms:10%"></span>
              <span style="--mx:42%; --my:64%; --ms:8%"></span>
              <span style="--mx:68%; --my:28%; --ms:6%"></span>
            </div>
          </div>
          <div class="tiny-star tiny-star--1"></div>
          <div class="tiny-star tiny-star--2"></div>
          <div class="tiny-star tiny-star--3"></div>
          <div class="tiny-star tiny-star--4"></div>
          <div class="tiny-star tiny-star--5"></div>
          <div class="mountain mountain--night"></div>
        </div>
      </section>

      <!-- ページ3: ほしぞら -->
      <section class="page page--stars" data-scene="stars">
        <div class="narration narration--night">__NAME__くん、<br/>おほしさま いっぱい</div>
        <div class="sky sky--stars">
          <div class="big-star big-star--1" aria-hidden="true">
            <svg viewBox="0 0 60 60"><polygon points="30,4 36,22 56,22 40,34 46,54 30,42 14,54 20,34 4,22 24,22" fill="#ffd166" stroke="#1a1a2e" stroke-width="3" stroke-linejoin="round"/></svg>
          </div>
          <div class="big-star big-star--2" aria-hidden="true">
            <svg viewBox="0 0 60 60"><polygon points="30,4 36,22 56,22 40,34 46,54 30,42 14,54 20,34 4,22 24,22" fill="#fff7c8" stroke="#1a1a2e" stroke-width="3" stroke-linejoin="round"/></svg>
          </div>
          <div class="big-star big-star--3" aria-hidden="true">
            <svg viewBox="0 0 60 60"><polygon points="30,4 36,22 56,22 40,34 46,54 30,42 14,54 20,34 4,22 24,22" fill="#ffd166" stroke="#1a1a2e" stroke-width="3" stroke-linejoin="round"/></svg>
          </div>
          <div class="constellation" aria-hidden="true">
            <svg viewBox="0 0 400 200" preserveAspectRatio="none">
              <line x1="60"  y1="40"  x2="140" y2="80"  stroke="rgba(255,209,102,.55)" stroke-width="2"/>
              <line x1="140" y1="80"  x2="220" y2="60"  stroke="rgba(255,209,102,.55)" stroke-width="2"/>
              <line x1="220" y1="60"  x2="300" y2="120" stroke="rgba(255,209,102,.55)" stroke-width="2"/>
              <line x1="300" y1="120" x2="360" y2="80"  stroke="rgba(255,209,102,.55)" stroke-width="2"/>
            </svg>
          </div>
          <div class="tiny-star tiny-star--a"></div>
          <div class="tiny-star tiny-star--b"></div>
          <div class="tiny-star tiny-star--c"></div>
          <div class="tiny-star tiny-star--d"></div>
          <div class="tiny-star tiny-star--e"></div>
          <div class="tiny-star tiny-star--f"></div>
          <div class="tiny-star tiny-star--g"></div>
          <div class="tiny-star tiny-star--h"></div>
        </div>
      </section>

      <!-- ページ4: ながれぼし -->
      <section class="page page--shooting" data-scene="shooting">
        <div class="narration narration--night">__NAME__くん、<br/>ながれぼし！</div>
        <div class="sky sky--shooting">
          <div class="shooter shooter--1"><span class="trail-line"></span><span class="trail-head"></span></div>
          <div class="shooter shooter--2"><span class="trail-line"></span><span class="trail-head"></span></div>
          <div class="shooter shooter--3"><span class="trail-line"></span><span class="trail-head"></span></div>
          <div class="tiny-star tiny-star--1"></div>
          <div class="tiny-star tiny-star--2"></div>
          <div class="tiny-star tiny-star--3"></div>
          <div class="tiny-star tiny-star--4"></div>
          <div class="tiny-star tiny-star--5"></div>
          <div class="tiny-star tiny-star--6"></div>
          <div class="tiny-star tiny-star--7"></div>
          <div class="mountain mountain--night"></div>
        </div>
      </section>

      <!-- ページ5: あさやけ -->
      <section class="page page--dawn" data-scene="dawn">
        <div class="sky sky--dawn">
          <div class="dawn-sun" aria-hidden="true"></div>
          <div class="cloud-line cloud-line--d1"></div>
          <div class="cloud-line cloud-line--d2"></div>
          <div class="mountain mountain--dawn"></div>
          <div class="tiny-star tiny-star--fade1"></div>
          <div class="tiny-star tiny-star--fade2"></div>
        </div>
        <div class="title-banner title-banner--end">
          <span>__NAME__くん、<br/>あさだよー！</span>
        </div>
      </section>

      <div id="fx-layer" aria-hidden="true"></div>

      <div id="cam-window" class="cam-window cam-window--off" aria-label="みんなの かお">
        <video id="cam-video" autoplay playsinline muted></video>
        <button id="cam-toggle" class="cam-toggle" aria-label="__NAME__くんを タップ">
          <span class="cam-toggle-icon" aria-hidden="true">
            <svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
              <path d="M22 60 Q22 22 60 22 Q98 22 98 60 L98 50 Q82 36 60 36 Q38 36 22 50 Z"
                    fill="#3a2418" stroke="#1a1a2e" stroke-width="3" stroke-linejoin="round"/>
              <ellipse cx="60" cy="68" rx="38" ry="36" fill="#ffe0c2" stroke="#1a1a2e" stroke-width="3"/>
              <circle cx="34" cy="78" r="7" fill="#ff8aa8" opacity="0.85"/>
              <circle cx="86" cy="78" r="7" fill="#ff8aa8" opacity="0.85"/>
              <path d="M42 68 Q47 62 52 68" fill="none" stroke="#1a1a2e" stroke-width="3.5" stroke-linecap="round"/>
              <path d="M68 68 Q73 62 78 68" fill="none" stroke="#1a1a2e" stroke-width="3.5" stroke-linecap="round"/>
              <path d="M52 86 Q60 94 68 86" fill="#ff6b9d" stroke="#1a1a2e" stroke-width="3" stroke-linejoin="round" stroke-linecap="round"/>
            </svg>
          </span>
          <span class="cam-toggle-label">__NAME__くんを<br/>タップ！</span>
        </button>
      </div>

      <nav class="parent-nav" aria-label="ぺーじ そうさ">
        <a class="home-btn" href="../" aria-label="ほんだなへ もどる">🏠</a>
        <button class="nav-btn nav-btn--prev" aria-label="まえのページ">◀</button>
        <div class="dots" id="dots"></div>
        <button class="nav-btn nav-btn--next" aria-label="つぎのページ">▶</button>
      </nav>
    </main>

    <script src="config.js"></script>
    <script src="../shared/ehon.js"></script>
  </body>
</html>
