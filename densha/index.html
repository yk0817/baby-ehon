<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="theme-color" content="#b3e5fc" />
    <title>いちかくんの でんしゃ</title>
    <link rel="stylesheet" href="../shared/ehon.css" />
    <link rel="stylesheet" href="theme.css" />
  </head>
  <body>
    <main id="book" aria-label="でんしゃの えほん">

      <!-- ページ1: 発車 -->
      <section class="page is-active" data-scene="hassha">
        <div class="sky sky--morning">
          <div class="sun" aria-hidden="true"></div>
          <div class="cloud cloud--a"></div>
          <div class="cloud cloud--b"></div>
          <div class="rail-bed rail-bed--platform"></div>
          <div class="platform"></div>
          <div class="platform-edge"></div>
          <div class="rail rail--upper"></div>
          <div class="rail-ties"></div>
          <div class="train train--stop" aria-hidden="true">
            <svg viewBox="0 0 480 100" xmlns="http://www.w3.org/2000/svg">
              <!-- 後車 -->
              <rect x="6" y="30" width="120" height="56" rx="8" fill="#ffffff" stroke="#1a1a2e" stroke-width="4"/>
              <rect x="6" y="46" width="120" height="14" fill="#ff6b9d"/>
              <rect x="24" y="40" width="18" height="14" fill="#9bd2ff" stroke="#1a1a2e" stroke-width="2"/>

              <rect x="84" y="40" width="18" height="14" fill="#9bd2ff" stroke="#1a1a2e" stroke-width="2"/>
              <rect x="106" y="65" width="14" height="18" fill="#1a1a2e"/>
              <circle cx="28" cy="92" r="9" fill="#1a1a2e"/>
              <circle cx="60" cy="92" r="9" fill="#1a1a2e"/>
              <circle cx="100" cy="92" r="9" fill="#1a1a2e"/>
              <!-- 中車 -->
              <rect x="138" y="30" width="120" height="56" rx="8" fill="#ffffff" stroke="#1a1a2e" stroke-width="4"/>
              <rect x="138" y="46" width="120" height="14" fill="#ff6b9d"/>
              <rect x="156" y="40" width="18" height="14" fill="#9bd2ff" stroke="#1a1a2e" stroke-width="2"/>
              <rect x="186" y="40" width="18" height="14" fill="#9bd2ff" stroke="#1a1a2e" stroke-width="2"/>
              <rect x="216" y="40" width="18" height="14" fill="#9bd2ff" stroke="#1a1a2e" stroke-width="2"/>

              <circle cx="240" cy="92" r="9" fill="#1a1a2e"/>
              <!-- 先頭車 (流線型) -->
              <path d="M270 30 L400 30 Q450 30 470 60 Q450 86 400 86 L270 86 Z"
                    fill="#ffffff" stroke="#1a1a2e" stroke-width="4" stroke-linejoin="round"/>
              <path d="M270 46 L400 46 Q445 46 462 60 Q448 60 460 60 L460 60 L270 60 Z"
                    fill="#ff6b9d" stroke="none"/>
              <rect x="286" y="40" width="18" height="14" fill="#9bd2ff" stroke="#1a1a2e" stroke-width="2"/>
              <rect x="316" y="40" width="18" height="14" fill="#9bd2ff" stroke="#1a1a2e" stroke-width="2"/>
              <ellipse cx="430" cy="56" rx="14" ry="10" fill="#ffe066" stroke="#1a1a2e" stroke-width="3"/>
              <ellipse cx="427" cy="56" rx="4" ry="4" fill="#1a1a2e"/>
              <path d="M380 70 Q400 78 430 76" fill="none" stroke="#1a1a2e" stroke-width="3" stroke-linecap="round"/>
              <circle cx="290" cy="92" r="9" fill="#1a1a2e"/>
              <circle cx="330" cy="92" r="9" fill="#1a1a2e"/>
              <circle cx="380" cy="92" r="9" fill="#1a1a2e"/>
            </svg>
          </div>
        </div>
        <div class="title-banner"><span>いちかくんの<br/>でんしゃ</span></div>
      </section>

      <!-- ページ2: まち -->
      <section class="page" data-scene="machi">

          <div class="rail-ties"></div>
          <div class="train train--run" aria-hidden="true">

              <rect x="6" y="30" width="120" height="56" rx="8" fill="#ffffff" stroke="#1a1a2e" stroke-width="4"/>

              <path d="M380 70 Q400 78 430 76" fill="none" stroke="#1a1a2e" stroke-width="3" stroke-linecap="round"/>
              <circle cx="290" cy="92" r="9" fill="#1a1a2e"/>
              <circle cx="330" cy="92" r="9" fill="#1a1a2e"/>
              <circle cx="380" cy="92" r="9" fill="#1a1a2e"/>
            </svg>
          </div>
        </div>
      </section>

      <!-- ページ3: 鉄橋 -->
      <section class="page" data-scene="tekkyo">
        <div class="narration">いちかくん、<br/>てっきょう だよ</div>
        <div class="sky sky--bridge">
          <div class="cloud cloud--a"></div>
          <div class="mountain mountain--1"></div>
          <div class="mountain mountain--2"></div>
          <div class="bridge-truss"></div>
          <div class="river">
            <div class="river-glint river-glint--1"></div>
            <div class="river-glint river-glint--2"></div>
          </div>
          <div class="train train--cross" aria-hidden="true">
            <svg viewBox="0 0 480 100" xmlns="http://www.w3.org/2000/svg">
              <rect x="6" y="30" width="120" height="56" rx="8" fill="#ffffff" stroke="#1a1a2e" stroke-width="4"/>
              <rect x="6" y="46" width="120" height="14" fill="#ff6b9d"/>
              <rect x="24" y="40" width="18" height="14" fill="#9bd2ff" stroke="#1a1a2e" stroke-width="2"/>
              <rect x="54" y="40" width="18" height="14" fill="#9bd2ff" stroke="#1a1a2e" stroke-width="2"/>
              <rect x="84" y="40" width="18" height="14" fill="#9bd2ff" stroke="#1a1a2e" stroke-width="2"/>
              <rect x="138" y="30" width="120" height="56" rx="8" fill="#ffffff" stroke="#1a1a2e" stroke-width="4"/>
              <rect x="138" y="46" width="120" height="14" fill="#ff6b9d"/>
              <rect x="156" y="40" width="18" height="14" fill="#9bd2ff" stroke="#1a1a2e" stroke-width="2"/>
              <rect x="186" y="40" width="18" height="14" fill="#9bd2ff" stroke="#1a1a2e" stroke-width="2"/>
              <rect x="216" y="40" width="18" height="14" fill="#9bd2ff" stroke="#1a1a2e" stroke-width="2"/>
              <path d="M270 30 L400 30 Q450 30 470 60 Q450 86 400 86 L270 86 Z"
                    fill="#ffffff" stroke="#1a1a2e" stroke-width="4" stroke-linejoin="round"/>
              <rect x="270" y="46" width="180" height="14" fill="#ff6b9d"/>
              <rect x="286" y="40" width="18" height="14" fill="#9bd2ff" stroke="#1a1a2e" stroke-width="2"/>
              <rect x="316" y="40" width="18" height="14" fill="#9bd2ff" stroke="#1a1a2e" stroke-width="2"/>
              <ellipse cx="430" cy="56" rx="14" ry="10" fill="#ffe066" stroke="#1a1a2e" stroke-width="3"/>
              <ellipse cx="427" cy="56" rx="4" ry="4" fill="#1a1a2e"/>
              <path d="M380 70 Q400 78 430 76" fill="none" stroke="#1a1a2e" stroke-width="3" stroke-linecap="round"/>
            </svg>
          </div>
        </div>
      </section>

      <!-- ページ4: 夜の街 -->
      <section class="page" data-scene="yorunomachi">
        <div class="narration narration--night">いちかくん、<br/>よるの まち</div>
        <div class="sky sky--night">
          <div class="moon"></div>
          <div class="star star--1"></div>
          <div class="star star--2"></div>
          <div class="star star--3"></div>
          <div class="star star--4"></div>
          <div class="star star--5"></div>
          <div class="cityline cityline--night">
            <div class="building building--1"></div>
            <div class="building building--2"></div>
            <div class="building building--3"></div>
            <div class="building building--4"></div>
            <div class="building building--5"></div>
            <div class="building building--6"></div>
          </div>
          <div class="rail-bed"></div>
          <div class="rail rail--upper"></div>
          <div class="rail-ties"></div>
          <div class="train train--night" aria-hidden="true">

              <rect x="6" y="30" width="120" height="56" rx="8" fill="#ffffff" stroke="#1a1a2e" stroke-width="4"/>
              <rect x="6" y="46" width="120" height="14" fill="#ff6b9d"/>

              <rect x="138" y="30" width="120" height="56" rx="8" fill="#ffffff" stroke="#1a1a2e" stroke-width="4"/>
              <rect x="138" y="46" width="120" height="14" fill="#ff6b9d"/>
              <rect x="156" y="40" width="18" height="14" fill="#ffe066" stroke="#1a1a2e" stroke-width="2"/>
              <rect x="186" y="40" width="18" height="14" fill="#ffe066" stroke="#1a1a2e" stroke-width="2"/>
              <rect x="216" y="40" width="18" height="14" fill="#ffe066" stroke="#1a1a2e" stroke-width="2"/>
              <path d="M270 30 L400 30 Q450 30 470 60 Q450 86 400 86 L270 86 Z"
                    fill="#ffffff" stroke="#1a1a2e" stroke-width="4" stroke-linejoin="round"/>
              <rect x="270" y="46" width="180" height="14" fill="#ff6b9d"/>
              <rect x="286" y="40" width="18" height="14" fill="#ffe066" stroke="#1a1a2e" stroke-width="2"/>
              <rect x="316" y="40" width="18" height="14" fill="#ffe066" stroke="#1a1a2e" stroke-width="2"/>
              <ellipse cx="430" cy="56" rx="14" ry="10" fill="#ffe066" stroke="#1a1a2e" stroke-width="3"/>
              <ellipse cx="427" cy="56" rx="4" ry="4" fill="#1a1a2e"/>
            </svg>
          </div>
        </div>
      </section>

      <!-- ページ5: 終着駅 -->
      <section class="page" data-scene="shuchaku">
        <div class="sky sky--sunset">
          <div class="sun" style="background: radial-gradient(circle at 35% 35%, #ffe4b5, #ff8a5b); box-shadow: 0 0 80px rgba(255,138,91,.8);"></div>
          <div class="rail-bed rail-bed--platform"></div>
          <div class="platform"></div>
          <div class="platform-edge"></div>
          <div class="rail rail--upper"></div>
          <div class="rail-ties"></div>

              <path d="M380 70 Q400 78 430 76" fill="none" stroke="#1a1a2e" stroke-width="3" stroke-linecap="round"/>
            </svg>
          </div>
        </div>
        <div class="title-banner title-banner--end"><span>いちかくん、<br/>ついたー！</span></div>
      </section>

      <div id="fx-layer" aria-hidden="true"></div>

      <div id="cam-window" class="cam-window cam-window--off" aria-label="みんなの かお">
        <video id="cam-video" autoplay playsinline muted></video>
        <button id="cam-toggle" class="cam-toggle" aria-label="いちかくんを タップ">
          <span class="cam-toggle-icon" aria-hidden="true">
            <svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
              <path d="M22 60 Q22 22 60 22 Q98 22 98 60 L98 50 Q82 36 60 36 Q38 36 22 50 Z"
                    fill="#3a2418" stroke="#1a1a2e" stroke-width="3" stroke-linejoin="round"/>
